services:
  vibevoice:
    image: vibevoice-ru-4bit:latest
    build:
      context: .
      args:
        # HF_TOKEN нужен только если модель приватная
        HF_TOKEN: ${HF_TOKEN:-}
    container_name: vibevoice_asr
    restart: unless-stopped
    ports:
      - "7860:7860"
    volumes:
      # Транскрипции сохраняются на хосте
      - ./output:/app/output
      # Опционально: если модель уже скачана на хосте — можно подмонтировать
      # вместо повторной загрузки при пересборке:
      # - /path/to/hf_cache/VibeVoice-ASR-4bit:/app/models/VibeVoice-ASR-4bit:ro
    environment:
      # По умолчанию — 4-bit для RTX 4060 Ti 16 GB
      - VIBEVOICE_MODEL_REPO=scerz/VibeVoice-ASR-4bit
      - VIBEVOICE_MODEL_PATH=/app/models/VibeVoice-ASR-4bit
      # Чтобы переключиться на полную модель (нужно больше 16 GB VRAM):
      # - VIBEVOICE_MODEL_REPO=microsoft/VibeVoice-ASR-HF
      # - VIBEVOICE_MODEL_PATH=/app/models/VibeVoice-ASR-HF
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: '4gb'
