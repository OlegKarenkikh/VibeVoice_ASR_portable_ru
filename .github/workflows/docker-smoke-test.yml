name: Container Smoke Test

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types: [completed]
  workflow_dispatch:

jobs:
  smoke-test:
    name: Smoke Test (CPU, no GPU)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull image from Docker Hub
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest

      # --entrypoint python3 bypasses entrypoint.sh + run_app.py + app.py entirely
      - name: Test 1 - Container starts
        run: |
          docker run --rm \
            --entrypoint python3 \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            -c "print('Container OK')"

      - name: Test 2 - Python imports
        run: |
          docker run --rm \
            --entrypoint python3 \
            -v "$PWD/tests:/tests:ro" \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            /tests/check_imports.py

      - name: Test 3 - Model files present
        run: |
          docker run --rm \
            --entrypoint python3 \
            -v "$PWD/tests:/tests:ro" \
            -e VIBEVOICE_MODEL_PATH=/app/models/VibeVoice-ASR-4bit \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            /tests/check_model.py

      - name: Test 4 - FFmpeg available
        run: |
          docker run --rm \
            --entrypoint ffmpeg \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            -version 2>&1 | head -1

      # Test 5: gradio_stub.py starts Gradio in a thread,
      # polls it with urllib, exits 0/1. No docker exec, no curl.
      - name: Test 5 - Gradio HTTP stack (stub, no model)
        timeout-minutes: 3
        run: |
          docker run --rm \
            --entrypoint python3 \
            -v "$PWD/tests:/tests:ro" \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            /tests/gradio_stub.py
