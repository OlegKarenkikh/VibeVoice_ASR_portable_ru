name: Container Smoke Test

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types: [completed]
  workflow_dispatch:

jobs:
  smoke-test:
    name: Smoke Test (CPU, no GPU)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull image from Docker Hub
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest

      # Тест 1: контейнер запускается
      - name: Test 1 - Container starts
        run: |
          docker run --rm \
            -e VIBEVOICE_MODEL_PATH=/app/models/VibeVoice-ASR-4bit \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            python3 -c "print('Container OK')"

      # Тест 2: Python-зависимости
      - name: Test 2 - Python imports
        run: |
          docker run --rm \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            python3 -c "
          import torch, torchaudio, transformers, gradio, soundfile, numpy
          print(f'torch:        {torch.__version__}')
          print(f'transformers: {transformers.__version__}')
          print(f'gradio:       {gradio.__version__}')
          print(f'CUDA available: {torch.cuda.is_available()}')
          "

      # Тест 3: модель на диске
      - name: Test 3 - Model files present
        run: |
          docker run --rm \
            -e VIBEVOICE_MODEL_PATH=/app/models/VibeVoice-ASR-4bit \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            python3 -c "
          import os
          p = os.environ.get('VIBEVOICE_MODEL_PATH', '/app/models/VibeVoice-ASR-4bit')
          assert os.path.isdir(p), f'Model dir not found: {p}'
          files = os.listdir(p)
          print(f'Files ({len(files)}): {files[:10]}')
          assert any(f.endswith('.json') for f in files), 'No config .json found'
          print('Model check PASSED')
          "

      # Тест 4: FFmpeg
      - name: Test 4 - FFmpeg available
        run: |
          docker run --rm \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            ffmpeg -version 2>&1 | head -1

      # Тест 5: Gradio HTTP-стек работает (стаб без модели)
      # Запускаем минимальный gr.Interface без загрузки модели.
      # curl выполняется внутри контейнера через docker exec.
      # Реальный app.py (с загрузкой модели) — только на GPU-хосте.
      - name: Test 5 - Gradio HTTP stack (stub, no model)
        timeout-minutes: 2
        run: |
          docker run -d --name vv_gradio_test \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            python3 -u -c "
          import gradio as gr, time, threading

          demo = gr.Interface(fn=lambda x: x, inputs='text', outputs='text', title='Smoke Test')
          t = threading.Thread(
              target=demo.launch,
              kwargs={'server_name': '0.0.0.0', 'server_port': 7860, 'prevent_thread_lock': True},
              daemon=True
          )
          t.start()
          print('Gradio thread started, waiting...', flush=True)
          time.sleep(60)
          print('Done', flush=True)
          "

          echo "Waiting for Gradio stub to start..."
          for i in $(seq 1 12); do
            sleep 5
            STATUS=$(docker exec vv_gradio_test \
              curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:7860/ 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Gradio HTTP 200 — PASSED"
              docker stop vv_gradio_test
              exit 0
            fi
          done

          echo "❌ Gradio не ответил за 60 сек. Логи:"
          docker logs vv_gradio_test
          docker stop vv_gradio_test
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f vv_gradio_test 2>/dev/null || true
