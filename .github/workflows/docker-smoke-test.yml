name: Container Smoke Test

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types: [completed]
  workflow_dispatch:

jobs:
  smoke-test:
    name: Smoke Test (CPU, no GPU)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull image from Docker Hub
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest

      # ----------------------------------------------------------------
      # Test 1: container starts
      # ----------------------------------------------------------------
      - name: Test 1 - Container starts
        run: |
          docker run --rm \
            -e VIBEVOICE_MODEL_PATH=/app/models/VibeVoice-ASR-4bit \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            python3 -c "print('Container OK')"

      # ----------------------------------------------------------------
      # Test 2: Python imports
      # ----------------------------------------------------------------
      - name: Test 2 - Python imports
        run: |
          docker run --rm \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            python3 -c "\
import torch, torchaudio, transformers, gradio, soundfile, numpy; \
print('torch:', torch.__version__); \
print('transformers:', transformers.__version__); \
print('gradio:', gradio.__version__); \
print('CUDA:', torch.cuda.is_available())"

      # ----------------------------------------------------------------
      # Test 3: model files on disk
      # ----------------------------------------------------------------
      - name: Test 3 - Model files present
        run: |
          docker run --rm \
            -e VIBEVOICE_MODEL_PATH=/app/models/VibeVoice-ASR-4bit \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            python3 -c "\
import os; \
p = os.environ.get('VIBEVOICE_MODEL_PATH', '/app/models/VibeVoice-ASR-4bit'); \
assert os.path.isdir(p), 'Model dir not found: ' + p; \
files = os.listdir(p); \
print('Files:', len(files), files[:5]); \
assert any(f.endswith('.json') for f in files), 'No .json config found'; \
print('Model check PASSED')"

      # ----------------------------------------------------------------
      # Test 4: FFmpeg
      # ----------------------------------------------------------------
      - name: Test 4 - FFmpeg available
        run: |
          docker run --rm \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            ffmpeg -version 2>&1 | head -1

      # ----------------------------------------------------------------
      # Test 5: Gradio HTTP stack (stub, no model)
      # Python script written to a temp file on the runner, then
      # copied into the container via docker cp — avoids all shell
      # quoting / escaping issues entirely.
      # ----------------------------------------------------------------
      - name: Test 5 - Gradio HTTP stack (stub, no model)
        timeout-minutes: 2
        run: |
          # Write the test script on the runner (no quoting tricks)
          cat > /tmp/gradio_stub.py << 'PYEOF'
          import gradio as gr
          import time
          import inspect

          demo = gr.Interface(
              fn=lambda x: x,
              inputs=gr.Textbox(),
              outputs=gr.Textbox(),
              title="Smoke Test",
          )

          # Gradio 4.x has prevent_thread_lock, 5/6 removed it
          launch_kwargs = dict(server_name="0.0.0.0", server_port=7860)
          sig = inspect.signature(demo.launch)
          if "prevent_thread_lock" in sig.parameters:
              launch_kwargs["prevent_thread_lock"] = True
              demo.launch(**launch_kwargs)
              time.sleep(60)
          else:
              # Gradio 5+: launch() blocks; run in thread
              import threading
              t = threading.Thread(target=demo.launch, kwargs=launch_kwargs, daemon=True)
              t.start()
              print("Gradio thread started", flush=True)
              time.sleep(60)
          PYEOF

          # Start container (no entrypoint — skip model check)
          docker run -d --name vv_gradio_test \
            --entrypoint python3 \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            /tmp/gradio_stub.py

          # Copy the script into the running container
          docker cp /tmp/gradio_stub.py vv_gradio_test:/tmp/gradio_stub.py

          echo "Waiting for Gradio stub..."
          for i in $(seq 1 12); do
            sleep 5
            STATUS=$(docker exec vv_gradio_test \
              curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:7860/ 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Test 5 PASSED - Gradio HTTP 200"
              docker stop vv_gradio_test
              exit 0
            fi
          done

          echo "Test 5 FAILED - Gradio did not respond in 60s. Logs:"
          docker logs vv_gradio_test
          docker stop vv_gradio_test
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f vv_gradio_test 2>/dev/null || true
