name: Container Smoke Test

on:
  # Запускаем после того, как build-and-push успешно завершился
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types: [completed]
  # Или вручную
  workflow_dispatch:

jobs:
  smoke-test:
    name: Smoke Test (CPU, no GPU)
    runs-on: ubuntu-latest
    # Тестируем только если сборка успешна (или ручной запуск)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull image from Docker Hub
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest
          docker images

      # Тест  1: контейнер запускается
      - name: Test 1 - Container starts
        run: |
          docker run --rm \
            -e VIBEVOICE_MODEL_PATH=/app/models/VibeVoice-ASR-4bit \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            python3 -c "print('Container OK')"

      # Тест 2: импорты Python-зависимостей
      - name: Test 2 - Python imports
        run: |
          docker run --rm \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            python3 -c "
          import torch
          import torchaudio
          import transformers
          import gradio
          import soundfile
          import numpy
          print(f'torch:        {torch.__version__}')
          print(f'transformers: {transformers.__version__}')
          print(f'gradio:       {gradio.__version__}')
          print(f'CUDA available: {torch.cuda.is_available()}')
          "

      # Тест 3: модель присутствует на диске
      - name: Test 3 - Model files present
        run: |
          docker run --rm \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            python3 -c "
          import os
          model_path = os.environ.get('VIBEVOICE_MODEL_PATH', '/app/models/VibeVoice-ASR-4bit')
          assert os.path.isdir(model_path), f'Model dir not found: {model_path}'
          files = os.listdir(model_path)
          print(f'Model dir: {model_path}')
          print(f'Files ({len(files)}): {files[:10]}')
          assert any(f.endswith('.json') for f in files), 'No config .json found'
          print('Model check PASSED')
          "

      # Тест 4: FFmpeg доступен
      - name: Test 4 - FFmpeg available
        run: |
          docker run --rm \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            ffmpeg -version | head -1

      # Тест 5: порт 7860 открывается (Gradio запускается, ожидаем 30 сек)
      - name: Test 5 - Gradio HTTP responds
        run: |
          docker run -d --name vv_test -p 7860:7860 \
            -e VIBEVOICE_MODEL_PATH=/app/models/VibeVoice-ASR-4bit \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest

          echo "Waiting for Gradio to start..."
          for i in $(seq 1 12); do
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:7860/ || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Gradio responded HTTP 200 — PASSED"
              docker stop vv_test
              exit 0
            fi
          done

          echo "Gradio did not respond in 60s — collecting logs:"
          docker logs vv_test
          docker stop vv_test
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f vv_test 2>/dev/null || true
