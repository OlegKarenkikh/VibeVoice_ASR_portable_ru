name: Container Smoke Test

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types: [completed]
  workflow_dispatch:

jobs:
  smoke-test:
    name: Smoke Test (CPU, no GPU)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull image from Docker Hub
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest

      # Тест 1: контейнер запускается
      - name: Test 1 - Container starts
        run: |
          docker run --rm \
            -e VIBEVOICE_MODEL_PATH=/app/models/VibeVoice-ASR-4bit \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            python3 -c "print('Container OK')"

      # Тест 2: Python-зависимости
      - name: Test 2 - Python imports
        run: |
          docker run --rm \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            python3 -c "
          import torch, torchaudio, transformers, gradio, soundfile, numpy
          print(f'torch:        {torch.__version__}')
          print(f'transformers: {transformers.__version__}')
          print(f'gradio:       {gradio.__version__}')
          print(f'CUDA available: {torch.cuda.is_available()}')
          "

      # Тест 3: модель на диске
      - name: Test 3 - Model files present
        run: |
          docker run --rm \
            -e VIBEVOICE_MODEL_PATH=/app/models/VibeVoice-ASR-4bit \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            python3 -c "
          import os
          p = os.environ.get('VIBEVOICE_MODEL_PATH', '/app/models/VibeVoice-ASR-4bit')
          assert os.path.isdir(p), f'Model dir not found: {p}'
          files = os.listdir(p)
          print(f'Files ({len(files)}): {files[:10]}')
          assert any(f.endswith('.json') for f in files), 'No config .json found'
          print('Model check PASSED')
          "

      # Тест 4: FFmpeg
      - name: Test 4 - FFmpeg available
        run: |
          docker run --rm \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest \
            ffmpeg -version 2>&1 | head -1

      # Тест 5: Gradio отвечает на HTTP
      # curl запускается внутри того же контейнера — без проблемы 127.0.0.1 vs 0.0.0.0
      - name: Test 5 - Gradio HTTP responds
        timeout-minutes: 3
        run: |
          docker run -d --name vv_test \
            -e VIBEVOICE_MODEL_PATH=/app/models/VibeVoice-ASR-4bit \
            -e GRADIO_SERVER_PORT=7860 \
            ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru:latest

          echo "Waiting for Gradio..."
          for i in $(seq 1 18); do
            sleep 5
            STATUS=$(docker exec vv_test \
              curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:7860/ 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Gradio HTTP 200 — PASSED"
              docker stop vv_test
              exit 0
            fi
          done

          echo "❌ Gradio не ответил за 90 сек. Логи:"
          docker logs vv_test
          docker stop vv_test
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f vv_test 2>/dev/null || true
