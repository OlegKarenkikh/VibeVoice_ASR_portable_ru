name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - docker-compose.yml
      - requirements.txt
      - app.py
      - vibevoice/**
      - .github/workflows/docker-build-push.yml
  workflow_dispatch:
    inputs:
      model_repo:
        description: 'HuggingFace model repo (default: 4-bit)'
        required: false
        default: 'scerz/VibeVoice-ASR-4bit'

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/vibevoice-asr-ru

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune -af
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Determine model repo
        id: model
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "repo=${{ github.event.inputs.model_repo }}" >> $GITHUB_OUTPUT
          else
            echo "repo=scerz/VibeVoice-ASR-4bit" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VIBEVOICE_MODEL_REPO=${{ steps.model.outputs.repo }}
          # HF_TOKEN передаётся через BuildKit secret — не попадает в слои образа
          secrets: |
            hf_token=${{ secrets.HF_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed ${{ env.IMAGE_NAME }} @ ${{ steps.build-and-push.outputs.digest }}"
